version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: peopledd
      POSTGRES_PASSWORD: peopledd
      POSTGRES_DB: peopledd
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peopledd -d peopledd"]
      interval: 5s
      timeout: 3s
      retries: 10

  peopledd-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8000"
      HOST: "0.0.0.0"
      PEOPLEDD_OUTPUT_DIR: "/app/runs"
      DATABASE_URL: "postgresql://peopledd:peopledd@postgres:5432/peopledd"
      PEOPLEDD_API_KEY: "devlocal"
      PEOPLEDD_ALLOW_LEGACY_UNAUTH: "false"
    volumes:
      - ./runs:/app/runs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  peopledd-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "peopledd.worker"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PEOPLEDD_OUTPUT_DIR: "/app/runs"
      DATABASE_URL: "postgresql://peopledd:peopledd@postgres:5432/peopledd"
      PEOPLEDD_WORKER_POLL_SEC: "2"
      PEOPLEDD_STALE_RUNNING_MINUTES: "60"
    volumes:
      - ./runs:/app/runs
    restart: unless-stopped

volumes:
  postgres_data:
